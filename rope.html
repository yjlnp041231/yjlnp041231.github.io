<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>第3课：跳绳大作战</title>
    <style>
        :root { --p: #2ecc71; --w: #f1c40f; --d: #e74c3c; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding-bottom: 90px; }
        .header { background: var(--p); color: white; padding: 20px; text-align: center; }
        
        /* 核心计时器区域 */
        .timer-zone { background: white; margin: 15px; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        #display { font-size: 50px; font-weight: bold; color: var(--d); font-family: monospace; margin: 10px 0; }
        .btn-group { display: flex; gap: 10px; justify-content: center; }
        .btn { border: none; padding: 12px 15px; border-radius: 10px; color: white; font-weight: bold; flex: 1; font-size: 14px; }
        
        /* 动作演示（用代码画图，绝不乱码） */
        .svg-demo { background: #333; width: 100%; height: 200px; display: flex; align-items: center; justify-content: center; }
        
        .card { background: white; margin: 15px; border-radius: 12px; border-left: 5px solid var(--p); padding: 15px; }
        .title { font-weight: bold; font-size: 18px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .time-tag { font-size: 12px; color: #999; }
        ul { padding-left: 20px; font-size: 15px; line-height: 1.6; }
    </style>
</head>
<body>

<div class="header">
    <h1>第3课：小小飞人 (9人班)</h1>
    <p>90分钟课堂 | 人手一绳</p>
</div>

<div class="timer-zone">
    <div id="status" style="font-size: 14px; color: #666;">准备挑战</div>
    <div id="display">00:00</div>
    <div class="btn-group">
        <button class="btn" style="background:var(--w)" onclick="runTimer(30)">30秒挑战</button>
        <button class="btn" style="background:var(--p)" onclick="runTimer(60)">60秒测验</button>
        <button class="btn" style="background:#95a5a6" onclick="resetTimer()">复位</button>
    </div>
</div>

<div class="svg-demo">
    <svg width="200" height="150" viewBox="0 0 200 150">
        <circle cx="100" cy="40" r="15" fill="#fff"/> <line x1="100" y1="55" x2="100" y2="100" stroke="#fff" stroke-width="5"/> <line x1="100" y1="100" x2="85" y2="130" stroke="#fff" stroke-width="5"/> <line x1="100" y1="100" x2="115" y2="130" stroke="#fff" stroke-width="5"/>
        <path d="M70,80 Q100,20 130,80" fill="none" stroke="#f1c40f" stroke-width="3"/> <text x="55" y="145" fill="#aaa" font-size="12">落地轻如猫 | 手腕摇圆圈</text>
    </svg>
</div>

<div class="card">
    <div class="title">一、热身游戏 (15') <span class="time-tag">第1-15分钟</span></div>
    <ul>
        <li><b>躲绳子：</b>绳子摆地上，9人练习侧跳避让。</li>
        <li><b>关节操：</b>重点活动手腕和脚踝。</li>
    </ul>
</div>

<div class="card" style="border-left-color:var(--w)">
    <div class="title">二、技能精修 (45') <span class="time-tag">第16-60分钟</span></div>
    <ul>
        <li><b>量绳：</b>踩中点，拉直手柄至锁骨。</li>
        <li><b>节奏：</b>教练击掌，学生并脚空跳。</li>
        <li><b>纠错：</b>杜绝“抡大臂”，练习“手腕摇”。</li>
    </ul>
</div>

<div class="card" style="border-left-color:var(--d)">
    <div class="title">三、比赛与放松 (30') <span class="time-tag">第61-90分钟</span></div>
    <ul>
        <li><b>30s挑战：</b>看谁跳得最稳。</li>
        <li><b>60s测验：</b>记录每人跳的数量。</li>
        <li><b>颁奖：</b>评选今天的“节奏之王”。</li>
    </ul>
</div>

<script>
    let timerId = null;
    let audioCtx = null;

    function runTimer(seconds) {
        clearInterval(timerId);
        let timeLeft = seconds;
        document.getElementById('status').innerText = seconds + "秒挑战进行中！";
        updateDisplay(timeLeft);

        timerId = setInterval(() => {
            timeLeft--;
            updateDisplay(timeLeft);
            if (timeLeft <= 0) {
                clearInterval(timerId);
                document.getElementById('status').innerText = "时间到！休息一下";
                beep(); // 声音提醒
                alert("叮！时间到！");
            }
        }, 1000);
    }

    function resetTimer() {
        clearInterval(timerId);
        document.getElementById('display').innerText = "00:00";
        document.getElementById('status').innerText = "准备挑战";
    }

    function updateDisplay(s) {
        let mins = Math.floor(s / 60);
        let secs = s % 60;
        document.getElementById('display').innerText = 
            (mins < 10 ? '0' : '') + mins + ":" + (secs < 10 ? '0' : '') + secs;
    }

    // 简易提示音功能
    function beep() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let osc = audioCtx.createOscillator();
        osc.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.5);
    }
</script>

</body>
</html>
